name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Public boundary check
        run: node scripts/verify-public-boundary.mjs

      - name: Static security audit
        run: node scripts/audit-public-shell.mjs

      - name: Run automated tests
        run: npm test

      - name: Stage public artifact
        run: node scripts/stage-public-artifact.mjs

      - name: Leak scan staged artifact
        run: node scripts/scan-deployment-artifact.mjs .stage-public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .stage-public

  deploy:
    needs: verify
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
